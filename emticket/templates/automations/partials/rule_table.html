<table class="w-full text-sm">
  <thead class="bg-slate-50 text-slate-600">
    <tr>
      <th class="text-left p-3">Name</th>
      <th class="text-left p-3">Trigger</th>
      <th class="text-left p-3">Priority</th>
      <th class="text-left p-3">Run Once</th>
      <th class="text-left p-3">Status</th>
      <th class="p-3"></th>
    </tr>
  </thead>
  <tbody>
    {% for rule in rules %}
      {% include "automations/partials/rule_row.html" %}
    {% empty %}
    <tr><td colspan="6" class="p-8 text-center text-slate-400">No automation rules yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
