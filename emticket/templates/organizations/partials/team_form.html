{% extends "base.html" %}
{% block title %}New Team — Hospital Desk{% endblock %}
{% block content %}
<div class="mb-4"><a href="{% url 'organizations:org_list' %}" class="text-sm text-slate-500 hover:underline">← Organizations</a></div>
<div class="max-w-lg bg-white rounded-xl border p-6">
  <h1 class="text-lg font-semibold mb-5">New Team — {{ dept.name }}</h1>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {% for field in form %}
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<p class="text-xs text-red-600 mt-1">{{ field.errors.0 }}</p>{% endif %}
    </div>
    {% endfor %}
    <div class="flex gap-3 pt-2">
      <button type="submit" class="px-4 py-2 bg-slate-900 text-white text-sm rounded-lg">Save</button>
      <a href="{% url 'organizations:org_list' %}" class="px-4 py-2 border text-sm rounded-lg">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
