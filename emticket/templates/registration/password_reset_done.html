<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Your Email · Hospital Desk</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8 text-center">
    <div class="text-4xl mb-4">✉</div>
    <h1 class="text-xl font-bold text-slate-800 mb-2">Check your inbox</h1>
    <p class="text-sm text-slate-500">
      If an account exists for that email address, we've sent a password reset link.
      Check your spam folder if you don't see it within a few minutes.
    </p>
    <a href="{% url 'login' %}"
       class="mt-6 inline-block px-5 py-2.5 rounded-xl bg-slate-900 text-white text-sm font-medium hover:bg-slate-800 transition">
      Back to sign in
    </a>
  </div>
</body>
</html>
