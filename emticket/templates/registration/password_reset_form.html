<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password · Hospital Desk</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
    <div class="mb-6 text-center">
      <h1 class="text-2xl font-bold text-slate-800">Reset Password</h1>
      <p class="text-sm text-slate-500 mt-1">Enter your email and we'll send a reset link.</p>
    </div>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label for="id_email" class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
        <input type="email" name="email" id="id_email" required autofocus
               class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
      </div>
      <button type="submit"
              class="w-full rounded-xl bg-slate-900 text-white py-3 text-sm font-medium hover:bg-slate-800 transition">
        Send Reset Link
      </button>
    </form>

    <div class="mt-6 text-center">
      <a href="{% url 'login' %}" class="text-sm text-slate-600 hover:text-slate-900">Back to sign in</a>
    </div>
  </div>
</body>
</html>
