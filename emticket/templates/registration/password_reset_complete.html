<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset Complete · Hospital Desk</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8 text-center">
    <div class="text-4xl mb-4">✓</div>
    <h1 class="text-xl font-bold text-slate-800 mb-2">Password updated</h1>
    <p class="text-sm text-slate-500 mb-6">Your password has been set. You can now sign in with your new password.</p>
    <a href="{% url 'login' %}"
       class="inline-block px-5 py-2.5 rounded-xl bg-slate-900 text-white text-sm font-medium hover:bg-slate-800 transition">
      Sign in
    </a>
  </div>
</body>
</html>
