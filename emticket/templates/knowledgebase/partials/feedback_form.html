<form hx-post="{% url 'knowledgebase:article_feedback' article.pk %}"
      hx-target="#feedback-widget"
      hx-swap="innerHTML"
      class="flex items-center gap-3">
  {% csrf_token %}
  <span class="text-sm text-slate-600">Was this helpful?</span>
  <button type="submit" name="was_helpful" value="true"
          class="px-3 py-1 border rounded text-sm hover:bg-green-50 hover:border-green-400">Yes</button>
  <button type="submit" name="was_helpful" value="false"
          class="px-3 py-1 border rounded text-sm hover:bg-red-50 hover:border-red-400">No</button>
</form>
