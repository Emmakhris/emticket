<div id="my-queue" class="bg-white rounded-xl border p-5">
  <h2 class="font-semibold mb-3 text-sm">My Queue</h2>
  {% if stats.my_queue %}
  <table class="w-full text-xs">
    <thead class="text-slate-500">
      <tr>
        <th class="text-left pb-2">Ticket</th>
        <th class="text-left pb-2">Title</th>
        <th class="text-left pb-2">Priority</th>
        <th class="text-left pb-2">SLA</th>
      </tr>
    </thead>
    <tbody>
      {% for t in stats.my_queue %}
      <tr class="border-t">
        <td class="py-2">
          <a href="{% url 'tickets:detail' t.id %}" class="text-blue-600 hover:underline font-mono">
            {{ t.ticket_number|default:t.id|truncatechars:10 }}
          </a>
        </td>
        <td class="py-2 max-w-[180px] truncate">{{ t.title }}</td>
        <td class="py-2">{{ t.get_priority_display }}</td>
        <td class="py-2">
          {% load ticket_tags %}
          {% sla_pill t %}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <p class="text-sm text-slate-400">No tickets assigned to you.</p>
  {% endif %}
</div>
