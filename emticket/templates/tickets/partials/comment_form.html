<form method="post"
      hx-post="{% url 'tickets:add_comment' ticket.id %}"
      hx-target="#thread"
      hx-swap="innerHTML"
      class="flex flex-col gap-3">
  {% csrf_token %}
  <div class="grid grid-cols-1 gap-2">
    <label class="text-sm text-slate-600">Reply</label>
    {{ comment_form.body }}
  </div>

  <label class="flex items-center gap-2 text-sm text-slate-700">
    {{ comment_form.is_internal }}
    Internal note (agents only)
  </label>

  {% if comment_form.errors %}
    <div class="text-sm text-red-700 bg-red-50 border p-3 rounded-xl">
      {{ comment_form.errors }}
    </div>
  {% endif %}

  <div class="flex gap-3">
    <button class="px-4 py-2 rounded-xl bg-slate-900 text-white text-sm font-medium">
      Send
    </button>
    <button type="reset" class="px-4 py-2 rounded-xl bg-white border text-sm font-medium">
      Clear
    </button>
  </div>
</form>
