<div id="profile-card">
  {% if saved %}
  <div class="mb-3 px-3 py-2 rounded bg-green-50 text-green-700 text-sm">Profile saved.</div>
  {% endif %}

  <form hx-post="{% url 'accounts:user_update_profile' target_user.pk %}"
        hx-target="#profile-card"
        hx-swap="outerHTML"
        class="space-y-4">
    {% csrf_token %}
    {% for field in profile_form %}
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<p class="text-xs text-red-600 mt-1">{{ field.errors.0 }}</p>{% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="px-4 py-2 bg-slate-900 text-white text-sm rounded-lg">Save Profile</button>
  </form>
</div>
