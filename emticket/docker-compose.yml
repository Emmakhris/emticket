services:

  db:
    image: postgres:16-alpine
    container_name: emticket_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-emticket}
      POSTGRES_USER: ${POSTGRES_USER:-emticket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emticket}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emticket} -d ${POSTGRES_DB:-emticket}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: emticket_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  web:
    build: .
    container_name: emticket_web
    restart: unless-stopped
    command:
      - /app/scripts/entrypoint.sh
      - gunicorn
      - emticket.wsgi:application
      - --bind=0.0.0.0:8000
      - --workers=3
      - --timeout=120
      - --access-logfile=-
      - --error-logfile=-
    env_file: .env
    environment:
      # Override .env values so containers use Docker service names, not localhost
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: emticket_worker
    restart: unless-stopped
    command:
      - celery
      - -A
      - emticket
      - worker
      - -l
      - INFO
      - --concurrency=2
    env_file: .env
    environment:
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - .:/app
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    container_name: emticket_beat
    restart: unless-stopped
    command:
      - celery
      - -A
      - emticket
      - beat
      - -l
      - INFO
      - --scheduler
      - django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
  media_volume:
